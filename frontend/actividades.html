<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividades</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="top-banner"></header>
    
    <main class="contenedor-principal">
        <div class="titulo-admin-flex">
            <h1 class="titulo-seccion">Actividades</h1>

            <div class="controles-superiores">
                
                <button id="btn-abrir-modal-actividad" 
                    class="btn-crear-actividad-admin" 
                    style="display: none;">+ Crear Actividad</button>

                <button id="btn-mis-actividades" 
                    class="btn-visita-estudiante" 
                    style="display: none;">Mis actividades</button>
                
                <button id="btn-ver-disponibles" 
                    class="btn-visita-estudiante" 
                    style="display: none;">Ver Disponibles</button>
            </div>
        </div>
        
        <section class="folder-contenedor">

            <div class="folder-pestanas">
                <button class="btn-categoria activo" data-categoria="academicas">Academicas</button>
                <button class="btn-categoria" data-categoria="conferencias">Conferencias</button>
                <button class="btn-categoria" data-categoria="competencias">Competencias</button>
                <button class="btn-categoria" data-categoria="deportes">Deportes</button>
                <button class="btn-categoria" data-categoria="cultura">Cultura</button>
                <button class="btn-categoria" data-categoria="arte">Arte</button>
                <button class="btn-categoria" data-categoria="idiomas">Idiomas</button>
            </div>
            
            <div id="folder-cuerpo" class="folder-cuerpo">

                <div class="tarjeta-actividad">

                    <div class="actividad-info">
                        <h3>Conferencia de Ciberguridad</h3>
                        <p>aaaa</p>
                        <span class="recompensa"> x UTCOINS</span>
                    </div>

                    <div class="actividad-acciones">
                            <button class="btn-qr">Escanear QR</button>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <div id="modal-actividad" class="modal-overlay">
        
        <div class="modal-content">

            <h3>Crear Nueva Actividad</h3>
            <form id="form-crear-actividad">

                <div class="form-group">
                    <label for="act-titulo">Titulo:</label>
                    <input type="text" id="act-titulo" required placeholder="EJ: Torneo de ajedrez">
                </div>

                <div class="form-group">
                    <label for="act-descripcion">Descripcion:</label>
                    <textarea id="act-descripcion" required placeholder="Detalles de la actividad..."></textarea>
                </div>

                <div class="form-group">
                    <label for="act-puntos">Puntaje (UTcoins):</label>
                    <input type="number" id="act-puntos" min="1" required placeholder="Ej: 50">
                </div>

                <div class="form-group">
                    <label for="act-categoria">Categoria del Folder:</label>
                    <select id="act-categoria" required>
                        <option value="academicas">Academicas</option>
                        <option value="conferencias">Conferencias</option>
                        <option value="competencias">Competencias</option>
                        <option value="deportes">Deportes</option>
                        <option value="culturas">Culturas</option>
                        <option value="arte">Arte</option>
                        <option value="idiomas"> Idiomas</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="act-expiracion">Expiracion</label>
                    <select id="act-expiracion" required>
                        <option value="nunca">Nunca expira</option>
                        <option value="1">Expira en 1 dia</option>
                        <option value="2">Expira en 2 dias</option>
                        <option value="3">Expira en 3 dias</option>
                    </select>
                </div>

                <div class="modal-botones">
                    <button type="button" id="btn-cerrar-modal" class="btn-cancelar">Cancelar</button>
                    <button type="submit" class="btn-guardar">Guardar Activiadad</button>
                </div>

            </form>
        </div>
    </div>

    <script src="actividades.js"></script>
</body>
</html>
