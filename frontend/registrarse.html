<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="top-banner">
        <div class="banner-logo">
            <img src="/frontend/images/logo coin.png" alt="Logo UTcoins" class="logo-img">
        </div>
    </header>

    <main class="container">
        <div class="register-card">
            <h2>Registrarse</h2>
            <p class="subtitle">Ingresa tus datos para registrarte</p>

            <form id="register-form" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <div class="form-group">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" placeholder="" required>                    
                    </div>

                    <div class="form-group">
                        <label for="carrera">Carrera</label>
                        <input type="text" id="carrera" placeholder="" required>
                    </div>

                    <div class="form-group">
                        <label for="matricula">Matricula</label>
                        <input type="number" id="matricula" placeholder="" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" placeholder="ejemplo@universidad.edu" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>  
                </div>

                <button type="submit" class="btn-submit">Ingresar</button>
            </form>
        </div>
    </main>



</body>
</html>
