<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTcoins - Iniciar Sesión</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="top-banner">
        <div class="banner-logo">
            <img src="/frontend/images/logo coin.png" alt="Logo UTcoins" class="logo-img">
        </div>
    </header>

    <main class="container">
        <div class="login-card">
            <h1>Iniciar Sesión</h1>
            <p class="subtitle">Ingresa tus datos para acceder</p>
            
            <form id="login-form" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@universidad.edu" required>
                </div>

                <div class="form-group">
                    <label for="matricula">Matricula</label>
                    <input type="number" id="matricula" placeholder="" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-submit">Ingresar</button>
            </form>

            <div class="form-footer">
                <p>¿No tienes una cuenta? <a href="registrarse.html">Regístrate aquí</a></p>
                <br>
                <a href="index.html">Inicio</a>
            </div>
        </div>
    </main>

</body>
</html>
